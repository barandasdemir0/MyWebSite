name: Deploy MyWebSite (API and MVC)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: App Settings Variable Substitution
        uses: microsoft/variable-substitution@v1
        with:
          files: '**/appsettings.Production.json'
        env:
          ConnectionStrings.SqlServer: "Server=.\\MSSQLSERVER2022;Database=barandb_api;User ID=baran_user;Password=${{ secrets.MSSQL_PASSWORD }};TrustServerCertificate=True;"
          Seed.AdminPassword: ${{ secrets.SEED_ADMIN_PASSWORD }}
          Jwt.SecretKey: ${{ secrets.JWT_SECRET_KEY }}
          Email.Password: ${{ secrets.EMAIL_PASSWORD }}
          OAuth.GitHub.ClientSecret: ${{ secrets.GITHUB_CLIENT_SECRET }}
          OAuth.LinkedIn.ClientSecret: ${{ secrets.LINKEDIN_CLIENT_SECRET }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: |
          PROJECT_PATH=$(find . -name "WebApiLayer.csproj" | head -n 1)
          dotnet publish "$PROJECT_PATH" -c Release -o ./publish-api

      - name: Publish MVC
        run: |
          PROJECT_PATH=$(find . -name "WebUILayer.csproj" | head -n 1)
          dotnet publish "$PROJECT_PATH" -c Release -o ./publish-mvc

      # 5. ADIM: API Gönderimi
      - name: Deploy API via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.MY_FTP_HOST }}
          username: ${{ secrets.MY_FTP_USER }}
          password: ${{ secrets.MY_FTP_PASS }}
          server-dir: /api.barandasdemir.com/
          local-dir: ./publish-api/
          protocol: ftp

      # 6. ADIM: MVC Gönderimi
      - name: Deploy MVC via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.MY_FTP_HOST }}
          username: ${{ secrets.MY_FTP_USER }}
          password: ${{ secrets.MY_FTP_PASS }}
          server-dir: /httpdocs/
          local-dir: ./publish-mvc/
          protocol: ftp