name: Deploy MyWebSite (API + MVC)
on:
  push:
    branches: [ "dev" ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Kodu çek
      - name: Checkout
        uses: actions/checkout@v4
      # 2. .NET kur
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      # 3. NuGet cache
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-
      # 4. API appsettings.Production.json olustur
      - name: Create API Settings
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
          SEED_PASS: ${{ secrets.SEED_ADMIN_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ISS: ${{ secrets.JWT_ISSUER }}
          JWT_AUD: ${{ secrets.JWT_AUDIENCE }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASSWORD }}
          CORS: ${{ secrets.CORS_ORIGIN }}
        run: |
          jq -n \
            --arg db "$DB_CONN" \
            --arg seed "$SEED_PASS" \
            --arg jwt "$JWT_KEY" \
            --arg iss "$JWT_ISS" \
            --arg aud "$JWT_AUD" \
            --arg email "$EMAIL_PASS" \
            --arg cors "$CORS" \
            '{
              Logging: { LogLevel: { Default: "Warning" } },
              ConnectionStrings: { SqlServer: $db },
              Seed: { AdminEmail: "barandasdemir.bd@gmail.com", AdminPassword: $seed },
              Jwt: { SecretKey: $jwt, Issuer: $iss, Audience: $aud },
              Email: { Password: $email },
              Cors: { AllowedOrigins: [$cors] }
            }' > Backend/WebApiLayer/appsettings.Production.json
      # 5. MVC appsettings.Production.json olustur
      - name: Create MVC Settings
        env:
          GH_ID: ${{ secrets.CLIENT_ID_GITHUB }}
          GH_SECRET: ${{ secrets.CLIENT_SECRET_GITHUB }}
          LI_ID: ${{ secrets.CLIENT_ID_LINKEDIN }}
          LI_SECRET: ${{ secrets.CLIENT_SECRET_LINKEDIN }}
        run: |
          jq -n \
            --arg ghId "$GH_ID" \
            --arg ghSecret "$GH_SECRET" \
            --arg liId "$LI_ID" \
            --arg liSecret "$LI_SECRET" \
            '{
              Logging: { LogLevel: { Default: "Warning" } },
              ApiSettings: { BaseUrl: "https://api.barandasdemir.com/api/" },
              OAuth: {
                GitHub: {
                  ClientId: $ghId,
                  ClientSecret: $ghSecret
                },
                LinkedIn: {
                  ClientId: $liId,
                  ClientSecret: $liSecret
                }
              }
            }' > Frontend/WebUILayer/appsettings.Production.json
      # 6. API derle
      - name: Publish API
        run: dotnet publish Backend/WebApiLayer/WebApiLayer.csproj -c Release -o ./publish-api
      # 7. MVC derle
      - name: Publish MVC
        run: dotnet publish Frontend/WebUILayer/WebUILayer.csproj -c Release -o ./publish-mvc
      # 8. lftp kur
      - name: Install lftp
        run: sudo apt-get install -y lftp
      # 9. Bakim sayfasi olustur
      - name: Create Maintenance Page
        run: |
          cat > ./app_offline.htm << 'HTML'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Bakim</title></head>
          <body style="font-family:Arial;text-align:center;padding:50px;">
            <h1>Guncelleme yapiliyor</h1>
            <p>Site birkac dakika icinde tekrar aktif olacaktir.</p>
          </body>
          </html>
          HTML
      # 10. API bakima al
      - name: API - Maintenance ON
        run: |
          curl -T ./app_offline.htm ftp://${{ secrets.MY_FTP_HOST }}/api.barandasdemir.com/app_offline.htm --user "${{ secrets.MY_FTP_USER }}:${{ secrets.MY_FTP_PASS }}" --ftp-create-dirs
      # 11. MVC bakima al
      - name: MVC - Maintenance ON
        run: |
          curl -T ./app_offline.htm ftp://${{ secrets.MY_FTP_HOST }}/httpdocs/app_offline.htm --user "${{ secrets.MY_FTP_USER }}:${{ secrets.MY_FTP_PASS }}" --ftp-create-dirs
      # 12. API deploy
      - name: API - Deploy
        env:
          FTP_HOST: ${{ secrets.MY_FTP_HOST }}
          FTP_USER: ${{ secrets.MY_FTP_USER }}
          FTP_PASS: ${{ secrets.MY_FTP_PASS }}
        run: |
          lftp -u "${FTP_USER},${FTP_PASS}" "${FTP_HOST}" <<EOF
            set ftp:ssl-allow yes
            set ssl:verify-certificate no
            set net:timeout 60
            set net:max-retries 5
            set net:reconnect-interval-base 5
            mirror --reverse --delete --verbose ./publish-api/ /api.barandasdemir.com/
            quit
          EOF
      # 13. MVC deploy
      - name: MVC - Deploy
        env:
          FTP_HOST: ${{ secrets.MY_FTP_HOST }}
          FTP_USER: ${{ secrets.MY_FTP_USER }}
          FTP_PASS: ${{ secrets.MY_FTP_PASS }}
        run: |
          lftp -u "${FTP_USER},${FTP_PASS}" "${FTP_HOST}" <<EOF
            set ftp:ssl-allow yes
            set ssl:verify-certificate no
            set net:timeout 60
            set net:max-retries 5
            set net:reconnect-interval-base 5
            mirror --reverse --delete --verbose ./publish-mvc/ /httpdocs/
            quit
          EOF
      # 14. API bakimi kapat
      - name: API - Maintenance OFF
        continue-on-error: true
        run: |
          curl ftp://${{ secrets.MY_FTP_HOST }}/api.barandasdemir.com/ --user "${{ secrets.MY_FTP_USER }}:${{ secrets.MY_FTP_PASS }}" -Q "-DELE app_offline.htm"
      # 15. MVC bakimi kapat
      - name: MVC - Maintenance OFF
        continue-on-error: true
        run: |
          curl ftp://${{ secrets.MY_FTP_HOST }}/httpdocs/ --user "${{ secrets.MY_FTP_USER }}:${{ secrets.MY_FTP_PASS }}" -Q "-DELE app_offline.htm"
